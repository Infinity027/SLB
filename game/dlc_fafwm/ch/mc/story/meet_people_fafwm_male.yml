name: Meet People - FAFWM
# This should always be fifth when shown.
sort: "0005"
type: generic
description: "Meet Cherie, Claire and Kiara!"
participants:
  - hero
condition: hero.is_male

outcomes:
  all_complete:
    condition: all(step.complete for step in self.parent.steps.values() if step.status != 0)
    description: "I've met Cherie, Claire and Kiara!"
  almost_all_complete:
    condition: all(step.complete for step in self.parent.steps.values())
    description: "I've met almost everyone"

steps:
  cherie:
    condition: hero.is_male
    name: Meet Cherie after completing the office investigation
    outcomes:
      success:
        conditions:
          - game.flags.dwaynefired or game.flags.dwaynedead
        next: None
