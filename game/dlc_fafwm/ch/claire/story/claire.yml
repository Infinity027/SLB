name: Claire
wiki_link: "https://wiki.andrealphusgames.com/wiki/Claire"
short: "{image=notify claire} · Claire"
description: "Claire is Adam's step mother, my childhood best friend. She's soft, sweet, and reminds me some of my best teenage years."
participants:
  - claire
conditions:
  - hero.is_male

outcomes:
  gone:
    description: Claire has left and is no longer part of my life.
    conditions:
      - claire.is_gone_forever
  engaged:
    description: Claire has agreed to marry me!
    condition: claire.flags.engagedmike

