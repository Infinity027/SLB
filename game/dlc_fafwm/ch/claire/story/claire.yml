    related_event: claire_event_01
    outcome:
      condition: '"claire_event_01" in DONE'

  love20:
    name: Get to know Claire better
    condition: '"claire_event_01" in DONE'
    percentage:
      value: claire.love.val
      scale: 20
    outcome:
      hide: True
      condition: claire.love >= 20

  claire_event_02:
