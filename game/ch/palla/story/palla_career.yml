name: Palla's Career
wiki_link: "https://wiki.andrealphusgames.com/wiki/Palla#Palla’s_Career"
short: "{image=notify palla} · Palla's career"
description: "Guide Palla through her career."
start:
  - career100
  - find_job
  - stuck_career
  - change_job
participants:
  - palla
conditions:
  - '"palla_event_14" in DONE'
  - palla.flags.career

outcomes:
  maxcareer:
    condition: palla.career.val >= 100
    description: Palla reached her highest career level.
  leftgame:
    condition: palla.is_gone_forever
    description: Palla is gone from my life.
    icon: fail

steps:
  career100:
    name: Guide Palla through her whole career.
    conditions:
      - '"palla_event_14" in DONE'
      - palla.flags.career
    percentage:
      value: palla.career.val
      scale: 100
    outcome:
      condition: palla.career.val >= 100

  find_job:
    name: Look for a job.
    toggle: True
    conditions:
      - not palla.flags.job
      - not AVAILABLE_JOBS.get('palla')
    outcome:
      condition: False

  stuck_career:
    name: Palla's career will no longer advance in her job.
    toggle: True
    conditions:
      - palla.flags.job and palla.career >= JOBS.get(palla.flags.job).career_max
    outcome:
      condition: False

  change_job:
    name: Palla can change her job.
    toggle: True
    conditions:
      - not palla.flags.job
      - AVAILABLE_JOBS.get('palla')
    outcome:
      next:
        - career10
      condition: palla.flags.job == 'nova'

  career10:
    name: Guide Palla through her career.
    percentage:
      value: palla.career.val
      scale: 10
    outcome:
      hide: True
      condition: palla.career.val >= 10
      next:
        - better_job_01

  better_job_01:
    name: Find a better job for Palla.
    conditions:
      - palla.career >= 10
    outcomes:
      complete:
        conditions:
          - set(['heirloom', 'boreale']).issubset(set(AVAILABLE_JOBS.get('palla', [])))
        hide: True
        next:
          - change_better_job_01
      already_done:
        conditions:
          - set(['heirloom', 'boreale']) & set(DONE_JOBS.get('palla', set()))
        hide: True
        next:
          - change_better_job_01

  change_better_job_01:
    name: Change Palla's job.
    conditions:
      - palla.career >= 10
      - set(['heirloom', 'boreale']).issubset(set(AVAILABLE_JOBS.get('palla', [])))
    outcomes:
      complete:
        conditions:
          - palla.flags.job in ['heirloom', 'boreale']
        next:
          - career15
      already_done:
        conditions:
          - set(['heirloom', 'boreale']) & set(DONE_JOBS.get('palla', set()))
        next:
          - career15

  career15:
    name: Guide Palla through her career.
    percentage:
      value: palla.career.val
      scale: 15
    outcome:
      hide: True
      condition: palla.career.val >= 15
      next:
        - better_job_02

  better_job_02:
    name: Find a better job for Palla. 2
    toggle: True
    conditions:
      - '"palla_career_event_02" in DONE'
    outcomes:
      complete:
        conditions:
          - set(['chronicle', 'spellbound', 'flair']).issubset(set(AVAILABLE_JOBS.get('palla', [])))
        hide: True
        next:
          - change_better_job_02
      already_done:
        conditions:
          - set(['chronicle', 'spellbound', 'flair']) & set(DONE_JOBS.get('palla', set()))
        hide: True
        next:
          - change_better_job_02

  change_better_job_02:
    name: Change Palla's job.
    conditions:
       - palla.career >= 15
       - set(['chronicle', 'spellbound', 'flair']).issubset(set(AVAILABLE_JOBS.get('palla', [])))
    outcomes:
      complete:
        next:
