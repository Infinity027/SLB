      - set(['minds_eye', 'aurore', 'anomalie']).issubset(set(AVAILABLE_JOBS.get('palla', [])))
    outcomes:
      stalled:
        next: None
        icon: stalled
        conditions:
          - palla.career >= 100
      changed:
        next: None
        conditions:
          - palla.flags.job in ['minds_eye', 'aurore', 'anomalie']
      already_done:
        conditions:
          - set(['minds_eye', 'aurore', 'anomalie']) & set(DONE_JOBS.get('palla', set()))
        next: None

  fired1:
    name: Find Palla a new job after she got fired.
    conditions:
      - '"palla_fired_talk_01" in DONE'
      - palla.flags.firedcount > 0
    outcome:
      next: None
      conditions:
        - '"palla_fired_talk_01" in DONE'
        - palla.flags.job

  fired2:
    name: Find Palla a new job after she got fired again.
    conditions:
      - '"palla_fired_talk_02" in DONE'
      - palla.flags.firedcount > 1
    outcome:
      next: None
      conditions:
