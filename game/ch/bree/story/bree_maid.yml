name: "Bree - Maid"
display_name: "[bree.name] - Maid"
wiki_link: "https://wiki.andrealphusgames.com/wiki/Bree#Maid_path"
short: "{image=notify bree} · [bree.name]"
description: "[bree.name] needs a job."
participants:
  - bree
conditions:
  - hero.is_male
  - "'bree_event_03' in DONE"

outcomes:
  gone:
    description: "[bree.name] has moved out and is no longer part of my life."
    condition: bree.is_gone_forever
    icon: fail
  failed:
    description: "[bree.name] decided to become a pro gamer."
    conditions:
      - "'bree_event_05' in DONE"
    hide_story: True
  complete:
    description: "[bree.name] works in the maid cafe."
    conditions:
      - '"bree_event_14c" in DONE or "bree_event_14c_alternate" in DONE'


