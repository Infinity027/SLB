    percentage:
      value: lavish.love.val
      scale: 200
    outcome:
      hide: True
      condition: lavish.love.val >= 200

  sleaze:
    name: Convince Lavish to give sexual favors for promotions
    condition: '"lavish_event_09" in DONE'
    percentage:
      value: 20 - lavish.flags.sleaze
      scale: 20
    outcomes:
      success:
        next: None
        conditions:
          - lavish.flags.sleaze >= 20
      fail:
        icon: fail
        next: None
        conditions:
          - '"lavish_event_12" in DONE'
          - lavish.flags.sleaze < 20

  career:
    name: Help Lavish earn a promotion
    condition: '"lavish_event_09" in DONE'
    percentage:
      value: 50 - lavish.career.val
      scale: 50
    outcomes:
      success:
        next: None
        conditions:
          - lavish.flags.promoted == 1
      fail:
        next: None
        icon: fail
        conditions:
          - '"lavish_event_12" in DONE'
          - lavish.flags.promoted == 0

  lavish_spanking_start:
    name: Shiori needs to be punished, be sure Lavish is around
    conditions:
      - '"shiori_scold_5" in DONE'
      - '"lavish_event_08" in DONE'
    outcomes:
      complete:
        condition: '"lavish_spanking_start" in DONE'
        next: lavish_spanking_1
      alternate_start:
        condition: '"lavish_spanking_alternate_start" in DONE'
        hide: True
        next: None

  lavish_spanking_1:
    name: Start spanking training with Lavish
    related_event: lavish_spanking_1
    conditions:
      - '"lavish_spanking_start" in DONE'
      - lavish.flags.start_spanking
      - lavish.love >= 110
      - lavish.sub >= 60
    outcome:
      condition: '"lavish_spanking_1" in DONE'
      next: spank_lavish

  lavish_spanking_alternate_start:
    name: Lavish wanders around the office while I'm working
    related_event: lavish_spanking_alternate_start
    conditions:
      - '"shiori_scold_5" in DONE'
      - '"audrey_spanking_start" in DONE'
      - '"lavish_event_08" in DONE'
    outcomes:
      complete:
        conditions:
          - '"lavish_spanking_alternate_start" in DONE'
          - lavish.flags.start_spanking
        next: spank_lavish
      failed:
        conditions:
          - '"lavish_spanking_alternate_start" in DONE'
          - not lavish.flags.start_spanking
        icon: fail
        next: None
      spanking_start:
        condition: '"lavish_spanking_start" in DONE'
        hide: True
        next: None

  spank_lavish:
    name: Spank Lavish
    condition: lavish.flags.start_spanking
    percentage:
      value: lavish.flags.spank_counter
      scale: 3
    outcome:
      hide: True
      condition: lavish.flags.spank_counter >= 3
      next:
        - lavish_spanking_2
        - lavish_sub_03

  lavish_spanking_2:
    name: Work while Lavish is in the office
    related_event: lavish_spanking_2
    conditions:
      - lavish.flags.start_spanking
      - lavish.flags.spank_counter >= 3
    outcome:
      condition: '"lavish_spanking_2" in DONE'
      next: None

  lavish_sub_03:
    name: Work while Lavish, Audrey and Shiori are in the office
    related_event: lavish_sub_03
    conditions:
      - Harem.together(audrey, lavish, shiori, name='office')
      - lavish.flags.spank_counter >= 3
      - lavish.love >= 160
      - lavish.sub >= 80
    outcomes:
      complete:
        condition: '"lavish_sub_03" in DONE'
        next: None
      done:
        condition: '"lavish_sub_03" in DONE'
        next: None
      not_all_together:
        conditions:
          - '"office_audrey_lavish_shiori_showdown" in DONE'
          - not Harem.together(audrey, lavish, shiori, name='office')
        next: None
        hide: True
      not_audrey_lavish_together:
        conditions:
          - '"office_audrey_lavish_showdown" in DONE'
          - not Harem.together(audrey, lavish, name='office')
        next: None
        hide: True
      not_audrey_shiori_together: # If Shiori is not in the harem hide
        conditions:
          - '"office_audrey_shiori_showdown" in DONE'
          - not Harem.together(audrey, shiori, name='office')
        next: None
        hide: True


  date:
    name: Go on a date with Lavish
    condition: True
    outcome:
      condition: lavish.flags.dates >= 1
      next: birthday_date

  birthday_date:
    name: Take Lavish out on a afternoon date for her birthday
    condition: lavish.flags.dates >= 1
    outcome:
      condition: '"lavish_birthday_date_male" in DONE'
      next: None

  sex:
    name: Have sex with Lavish
    condition: True
    outcome:
      condition: lavish.sexperience >= 1
      next: None

  love:
    name: Get Lavish to fall in love with me
    condition: True
    percentage:
      value: lavish.love.val
      scale: 200
    outcome:
      condition: lavish.love.val == 200
      next: None

  ring:
    name: Buy a wedding ring
    condition: True
    outcome:
      condition: hero.has_item("wedding_ring")

  propose:
    name: Propose to Lavish
    condition: hero.has_item("wedding_ring")
    outcome:
      condition: lavish.flags.engagedmike
      next: None

  preg:
    name: Get Lavish pregnant
    optional: True
    condition: True
    outcome:
      condition: lavish.flags.pregnancies_number > 0
      next: None

  slave:
    name: Make Lavish my sex slave
    optional: True
    condition: True
    outcome:
      condition: lavish.is_sex_slave
      next: None
