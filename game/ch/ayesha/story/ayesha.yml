  love25:
    name: Get to know Ayesha better
    percentage:
      value: ayesha.love.val
      scale: 25
    outcome:
      hide: True
      condition: ayesha.love >= 25

  ayesha_event_02:
    name: Meet Ayesha in the street
    related_event: ayesha_event_02
    condition: '"ayesha_event_01" in DONE'
    outcomes:
      complete:
        conditions:
          - '"ayesha_event_02" in DONE'
          - ayesha.flags.defended
        next: love40
      failed:
        conditions:
          - '"ayesha_event_02" in DONE'
