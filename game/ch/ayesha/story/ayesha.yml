name: Ayesha
wiki_link: "https://wiki.andrealphusgames.com/wiki/Ayesha"
short: "{image=notify ayesha} · Ayesha"
description: "Ayesha is a pro wrestler and a coach at the local gym."
participants:
  - ayesha
conditions:
  - hero.is_male
  - "'ayesha_teaser_2' in DONE"

start:
  - ayesha_event_01

outcomes:
