name: Ayesha and Hanna
display_name: Sporty Harem
wiki_link: "https://wiki.andrealphusgames.com/wiki/Sporty_Harem"
short: "{image=notify ayesha}{image=notify hanna} · Sporty Harem"
type: harem
description: "Hanna might find out about me and Ayesha. I should be careful."

participants:
  - ayesha
  - hanna

conditions:
  - ayesha.love >= 120
  - hanna.love >= 120

start:
  - sporty_harem_01

outcomes:
  ayesha_hanna_gone:
    description: Ayesha and Hanna have both left and are no longer part of my life.
    conditions:
      - ayesha.is_gone_forever
      - hanna.is_gone_forever
    icon: fail
  ayesha_gone:
    description: Ayesha has left and is no longer part of my life.
    conditions:
      - ayesha.is_gone_forever
    icon: fail
  hanna_gone:
    description: Hanna has left and is no longer part of my life.
    conditions:
      - hanna.is_gone_forever
    icon: fail
  sporty_harem:
    conditions:
      - Harem.together('ayesha', 'hanna', name='sporty')
      - ayesha.flags.engagedmike
      - hanna.flags.engagedmike
    description: Ayesha and Hanna agreed to marry me!

steps:
  ales:
    name: Make sure Ayesha is amenable to sex with other women
    condition: True
    percentage:
      value: ayesha.lesbian.val
      scale: 10
    outcome:
      condition: ayesha.lesbian >= 10

  alestoomuch:
    name: Make sure Ayesha is amenable to sex with men
    condition: ayesha.lesbian > 11
    percentage:
      value: 20 - ayesha.lesbian.val
      scale: 10
    outcome:
      condition: ayesha.lesbian <= 10

  alove130:
    name: Get to know Ayesha better
    percentage:
      value: ayesha.love.val
      scale: 130
    outcome:
      hide: True
      condition: ayesha.love >= 130

  hles:
    name: Make sure Hanna is amenable to sex with other women
    condition: True
    percentage:
      value: hanna.lesbian.val
      scale: 10
    outcome:
      condition: hanna.lesbian >= 10

  hlestoomuch:
    name: Make sure Hanna is amenable to sex with men
    condition: hanna.lesbian > 11
    percentage:
      value: 20 - hanna.lesbian.val
      scale: 10
    outcome:
      condition: hanna.lesbian <= 10

  hlove130:
    name: Get to know Hanna better
    percentage:
      value: hanna.love.val
      scale: 130
    outcome:
      hide: True
      condition: hanna.love >= 130

  ayesha_hanna_showdown_check:
    name: Have a hot coffee with Ayesha and Hanna within 7 days
    conditions:
      - ayesha.sexperience >= 3
      - hanna.sexperience >= 3
    outcomes:
      complete:
        condition: Person.showdown(ayesha, hanna)
        hide: True
      already_done:
        condition: '"ayesha_hanna_showdown" in DONE'
        hide: True

  ayesha_hanna_showdown:
    name: Go to the gym when Ayesha and Hanna are there too.
    related_event: ayesha_hanna_showdown
    conditions:
      - Person.showdown(ayesha, hanna)
    outcomes:
      success:
        conditions:
          - '"ayesha_hanna_showdown" in DONE'
          - Harem.together('ayesha', 'hanna', name='sporty')
      fail:
        next: None
        conditions:
          - '"ayesha_hanna_showdown" in DONE'
          - 'ayesha.hidden or hanna.hidden'

  sporty_harem_01:
    name: Take Hanna on a date at the mall.
    related_event: sporty_harem_event_01
    conditions:
      - Harem.together('ayesha', 'hanna', name='sporty')
    outcome:
      condition: '"sporty_harem_event_01" in DONE'

  sporty_harem_02:
    name: Go to the gym again, when Ayesha and Hanna are there too.
    related_event: sporty_harem_event_02
    conditions:
      - '"sporty_harem_event_01" in DONE'
      - Harem.together('ayesha', 'hanna', name='sporty')
    outcome:
      conditions:
        - '"sporty_harem_event_02" in DONE'
        - Harem.together('ayesha', 'hanna', name='sporty')

  propose_ayesha_hanna:
    name: Propose to Ayesha and Hanna
    conditions:
      - Harem.together('ayesha', 'hanna', name='sporty')
    outcome:
      conditions:
        - ayesha.flags.engagedmike
        - hanna.flags.engagedmike
