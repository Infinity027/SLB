name: Kylie and Ayesha
display_name: Taming Harem
wiki_link: "https://wiki.andrealphusgames.com/wiki/Taming_Harem"
short: "{image=notify kylie}{image=notify ayesha} · Taming Harem"
type: harem
description: Kylie & Ayesha.
participants:
  - kylie
  - ayesha
conditions:
  - '"kylie_attack_ayesha" in DONE'

outcomes:
  kylie_in_jail:
    icon: fail
    description: Kylie is in jail.
    conditions:
      - '"kylie_attack_ayesha" in DONE'
      - kylie.flags.schedule == "jail"
  failed_attack:
    icon: fail
    description: Kylie and Ayesha went in a fight. It didn't end well.
    conditions:
      - '"kylie_attack_ayesha" in DONE'
      - not Harem.together(kylie, ayesha)
      - kylie.flags.schedule != "jail"
  ayesha_kylie_gone:
    description: Ayesha and Kylie have both left and are no longer part of my life.
    conditions:
      - ayesha.is_gone_forever
      - kylie.is_gone_forever
    icon: fail
  ayesha_gone:
    description: Ayesha has left and is no longer part of my life.
    conditions:
      - ayesha.is_gone_forever
    icon: fail
  kylie_gone:
    description: Kylie has left and is no longer part of my life.
    conditions:
      - kylie.is_gone_forever
    icon: fail
  sporty_harem:
    conditions:
      - Harem.together('ayesha', 'kylie', name='taming')
      - ayesha.flags.engagedmike
      - kylie.flags.engagedmike
    description: Ayesha and Kylie agreed to marry me!

steps:
  kylie_attack_ayesha:
    name: Kylie run into Ayesha at the gym.
    related_event: kylie_attack_ayesha
    condition: '"kylie_attack_ayesha" in DONE'
    outcomes:
      success:
        description: The fight didn't end as expected.
        conditions:
          - '"kylie_attack_ayesha" in DONE'
          - Harem.together(kylie, ayesha)
      fail:
        next: None
        conditions:
          - '"kylie_attack_ayesha" in DONE'
          - not Harem.together(kylie, ayesha)

  kylie_sub35:
    name: Make Kylie more submissive
    percentage:
      value: kylie.sub.val
      scale: 35
    outcome:
      hide: True
      conditions: kylie.sub >= 35

  taming_date_restaurant:
    name: Go on a date with Kylie and Ayesha.
    conditions:
      - '"kylie_attack_ayesha" in DONE'
      - Harem.together(kylie, ayesha)
      - not game.flags.tamingDatesNumber
    outcome:
      condition: game.flags.tamingDatesNumber

  repeat_taming_date_restaurant:
    name: Date again with Kylie and Ayesha.
    conditions:
      - '"kylie_attack_ayesha" in DONE'
      - Harem.together(kylie, ayesha)
      - game.flags.tamingDatesNumber
    outcome:
      condition: game.flags.tamingDatesNumber > 1

  taming_event_03:
    name: Talk to Kylie or Ayesha about going on a date to the aquarium
    related_event: taming_event_03_a
    conditions:
      - game.flags.tamingDatesNumber >= 2
    outcomes:
      success:
        conditions:
          - '"taming_event_03_a" in DONE'
          - game.flags.taming_harem_event_03
      fail:
        conditions:
          - '"taming_event_03_a" in DONE'
          - not game.flags.taming_harem_event_03

  repeat_taming_date_aquarium:
    name: Date again with Kylie and Ayesha.
    conditions:
      - '"taming_event_03_a" in DONE'
      - game.flags.tamingDatesNumber >= 2
    outcome:
      condition: game.flags.taming_harem_event_03

  taming_event_04:
    name: Talk to Kylie or Ayesha about going on a date at home
    related_event: taming_event_04
    conditions:
      - game.flags.tamingDatesNumber >= 3
      - '"taming_event_03_a" in DONE'
      - game.flags.taming_harem_event_03
    outcomes:
      success:
        condition: '"taming_event_04" in DONE'

  taming_event_05:
    name: Talk to Kylie or Ayesha about meeting up at home again
    related_event: taming_event_05
    conditions:
      - game.flags.tamingDatesNumber >= 4
      - '"taming_event_04" in DONE'
    outcomes:
      success:
        condition: '"taming_event_05" in DONE'
        next: None

  propose_ayesha_kylie:
    name: Propose to Ayesha and Kylie
    conditions:
      - Harem.together('ayesha', 'kylie', name='taming')
    outcome:
      conditions:
        - ayesha.flags.engagedmike
        - kylie.flags.engagedmike
