      - hero.flags.isceo
      - Person.showdown(audrey, lavish)
    outcomes:
      complete:
        conditions:
          - '"office_audrey_lavish_showdown" in DONE'
          - Harem.together(audrey, lavish, name='office')
      failure:
        icon: fail
        conditions:
          - '"office_audrey_lavish_showdown" in DONE'
          - not Harem.together(audrey, lavish, name='office')
        next: None
      harem_already_formed:
        condition: Harem.together(audrey, lavish, name='office')
        hide: True

  office_audrey_lavish_wait:
    name: Wait for some news about Audrey and Lavish
    conditions:
      - '"office_audrey_lavish_showdown" in DONE'
      - Harem.together(audrey, lavish, name='office')
