steps:
  prepare_blissard_meeting:
    name: I have to work on Blissard's deal. They may try to con me.
    condition: hero.flags.isceo
    outcome:
      condition: 'not hero.flags.workonblissard'
      hide: True

  blissard_meeting:
    name: Seal the deal with Blissard Games.
    conditions:
      - hero.flags.isceo
      - 'not hero.flags.workonblissard'
    outcomes:
      complete:
        description: Blissard signed the deal.
        condition: game.flags.blissardsealed
      failure:
        icon: fail
        description: Blissard res.
        condition: game.flags.blissardsealed

  audrey_sex:
    name: Have sex with Audrey 3 times
    condition: True
    outcome:
      condition: audrey.sexperience >= 3

  lavish_sex:
    name: Have sex with Lavish 3 times
    condition: True
    outcome:
      condition: lavish.sexperience >= 3

  shiori_sex:
    name: Have sex with Shiori 3 times
    condition: True
    outcome:
      condition: shiori.sexperience >= 3

  aletta_sex:
    name: Have sex with Aletta 3 times
    conditions:
      - '"office_audrey_lavish_shiori_01" in DONE'
    outcome:
      condition: aletta.sexperience >= 3

  office_audrey_shiori_showdown_check:
    name: Have a hot coffee with Audrey and Shiori within 7 days
    conditions:
      - hero.flags.isceo
      - audrey.sexperience >= 3
      - shiori.sexperience >= 3
    outcomes:
      complete:
        condition: Person.showdown(audrey, shiori)
        hide: True
      already_done:
        condition: '"office_audrey_shiori_01" in DONE or "office_audrey_shiori_showdown" in DONE'
        hide: True
      harem_already_formed:
        condition: Harem.together(audrey, shiori, name='office')
        hide: True

  office_harem_audrey_shiori_showdown:
    name: Shiori brings coffee in my office every morning when I work
    related_event: office_audrey_shiori_showdown
    conditions:
      - hero.flags.isceo
      - Person.showdown(audrey, shiori)
    outcomes:
      complete:
        conditions:
          - '"office_audrey_shiori_01" in DONE or "office_audrey_shiori_showdown" in DONE'
          - Harem.together(audrey, shiori, name='office')
      failure:
        icon: fail
        conditions:
          - '"office_audrey_shiori_01" in DONE or "office_audrey_shiori_showdown" in DONE'
          - not Harem.together(audrey, shiori, name='office')
        next: None
      harem_already_formed:
        condition: Harem.together(audrey, shiori, name='office')
        hide: True

  office_audrey_shiori_wait:
    name: Wait for some news about Audrey and Shiori
    conditions:
      - '"office_audrey_shiori_01" in DONE or "office_audrey_shiori_showdown" in DONE'
      - Harem.together(audrey, shiori, name='office')
      - game.flags.officeharemaudshidelay
    outcome:
      hide: True
      conditions:
        - not game.flags.officeharemaudshidelay

  office_harem_audrey_shiori_02:
    name: Work in the morning
    related_event: office_audrey_shiori_02
    conditions:
      - not game.flags.officeharemaudshidelay
      - Harem.together(audrey, shiori, name='office')
    outcome:
