      condition: '"office_lavish_shiori_01" in DONE'

  office_audrey_lavish_shiori_showdown_check:
    name: Have a hot coffee with Audrey, Lavish and Shiori within 7 days
    conditions:
      - hero.flags.isceo
      - audrey.sexperience >= 3
      - lavish.sexperience >= 3
      - shiori.sexperience >= 3
