name: Kylie in jail
wiki_link: "https://wiki.andrealphusgames.com/wiki/Kylie#Prison_events"
short: "{image=notify kylie} · Kylie"
description: "Kylie is now in jail."
participants:
  - kylie
conditions:
  - '"kylie_investigation_3" in DONE'
  - kylie.flags.schedule == "jail"
outcomes:
  gone:
    conditions:
      - kylie.is_gone_forever
    description: Kylie has left and is no longer part of my life.
    icon: fail
  leave:
    conditions:
      - "'kylie_prison_visit_1' in DONE"
      - 'not kylie.flags.agreed_conjugal_visit'
    description: I've seen Kylie in jail. I hope she'll get better one day.
  conjugal_visits:
    conditions:
      - "'kylie_prison_visit_1' in DONE"
      - 'kylie.flags.agreed_conjugal_visit'
    description: I've accepted to see Kylie again for conjugal visits.

steps:
  kylie_prison_1:
    name: I'm wondering how Kylie's doing since the last time I saw her with Camila.
    related_event: kylie_prison_visit_1
    conditions:
      - '"kylie_investigation_3" in DONE'
      - '"camila_prison_visit_1" in DONE'
      - 'kylie.flags.schedule == "jail"'
      - 'not kylie.hidden'
      - 'kylie.sexperience >= 1'
      - 'kylie.love >= 100'
    outcomes:
      leave:
        conditions:
          - "'kylie_prison_visit_1' in DONE"
          - 'not kylie.flags.agreed_conjugal_visit'
        next: None
      conjugal:
        conditions:
          - "'kylie_prison_visit_1' in DONE"
          - 'kylie.flags.agreed_conjugal_visit'
        description: I've accepted to see Kylie again for conjugal visits.
        next: None

  kylie_trial_1:
    name: I think I saw an important letter last time I walked though the hallway. I should take a look at it...
    related_event: kylie_trial_1
    conditions:
      - '"kylie_investigation_3" in DONE and game.days_played >= DONE["kylie_investigation_3"] + 20'
      - 'kylie.flags.schedule == "jail"'
      - 'not kylie.hidden'
      - 'kylie.flags.killed'
    outcome:
      description: I have to attend to Kylie's murder trial.
      condition: "'kylie_trial_1' in DONE"
      next: kylie_trial_2

  kylie_trial_2:
    name: I have to attend Kylie's murder trial today. It will be at 12.
    related_event: kylie_trial_2
    conditions:
      - '"kylie_trial_1" in DONE'
      - 'kylie.flags.schedule == "jail"'
      - 'not kylie.hidden'
    outcomes:
      innocent:
        description: I testified on Kylie's behalf and helped get her released.
        conditions:
          - '"kylie_trial_2" in DONE'
          - 'kylie.flags.trial_verdict == "innocent"'
      crazy:
        description: I spoke out about Kylie's mental illness and it saved her from a heavier punishment than prison.
        conditions:
          - '"kylie_trial_2" in DONE'
          - 'kylie.flags.trial_verdict == "crazy"'
      missed_crazy:
        description: I missed Kylie's trial but I heard that she's gonna be kept in prison due to her mental illness.
        conditions:
          - '"kylie_trial_2_missed" in DONE'
          - 'kylie.flags.trial_verdict == "crazy"'
      guilty:
        description: I testified against Kylie and the sentence was the electric chair.
        conditions:
          - '"kylie_trial_2" in DONE'
          - 'kylie.flags.trial_verdict == "guilty"'
      tried_but_guilty:
        description: I tried to convince the judge not to punish Kylie too harshly for her crime, but the sentence was the electric chair.
        conditions:
          - '"kylie_trial_2" in DONE'
          - 'kylie.flags.trial_verdict == "tried_but_guilty"'
      missed_tried_but_guilty:
        description: I missed Kylie's trial but I received a letter telling me that she's gonna be executed in a few days.
        conditions:
          - '"kylie_trial_2_missed" in DONE'
          - 'kylie.flags.trial_verdict == "tried_but_guilty"'

  kylie_trial_3:
    name: Today Kylie's gonna be executed...and I have to attend to it...
    related_event: kylie_trial_3
    conditions:
      - '"kylie_trial_2" in DONE or "kylie_trial_2_missed" in DONE'
      - 'kylie.flags.trial_verdict == "guilty" or kylie.flags.trial_verdict == "tried_but_guilty"'
    outcomes:
      death:
        description: Kylie is dead now. She got what she deserved.
        conditions:
          - '"kylie_trial_3" in DONE'
          - 'kylie.flags.trial_verdict == "guilty"'
      missed_revenge:
        description: I've heard that Kylie execution never happen... Apparently they didn't find her in her cell the day of the execution... I have a bad feeling about this...
        conditions:
          - '"kylie_trial_3_missed" in DONE'
          - 'kylie.flags.trial_verdict == "guilty"'
      death_regrets:
        description: Kylie is dead now... I'm gonna miss her...
        conditions:
          - '"kylie_trial_3" in DONE'
          - 'kylie.flags.trial_verdict == "tried_but_guilty"'
      missed:
        description: I was not there to see Kylie's execution. I heard she was screaming my name, tears in the eyes, wondering why I was not there for her final moment.
        conditions:
          - '"kylie_trial_3_missed" in DONE'
          - 'kylie.flags.trial_verdict == "tried_but_guilty"'
