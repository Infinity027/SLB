name: Kylie
wiki_link: "https://wiki.andrealphusgames.com/wiki/Kylie"
short: "{image=notify kylie} · Kylie"
description:
  - description: "Kylie is the younger sister of my ex-girlfriend, Alexis. She is crazily hung up on me, and acts jealous every time she sees me with other women. This could be trouble!"
    condition: '"kylie_event_04" in DONE'
  - description: "Kylie is the younger sister of my ex-girlfriend, Alexis. She is crazily hung up on me."
    condition: '"call_kylie" in DONE'
  - description: "Kylie is the younger sister of my ex-girlfriend, Alexis. I remember Kylie from when she was 12, so finding out she has a gigantic crush on me is a little weird!"
    condition: '"kylie_event_02" in DONE'
  - description: "Kylie is the younger sister of my ex-girlfriend, Alexis. I remember Kylie from when she was 12, so her being an adult now is a little weird!"
    condition: True
start: charm50
participants:
  - kylie
condition: '"kylie_event_01" in DONE'
outcomes:
  arrested:
    description: Kylie was arrested. She will spend the rest of her days in a cold, dark cell.
    condition: '"kylie_investigation_3" in DONE'
  gone:
    conditions:
      - kylie.is_gone_forever
    description: Kylie has left and is no longer part of my life.
    icon: fail
  engaged:
    condition: kylie.flags.engagedmike
    description: Kylie has agreed to marry me!

steps:
  yandere50:
    name: Do not let Kylie's Yandere get too high.
    condition: '"kylie_event_02" in DONE'
    percentage:
      value: kylie.yandere.val
      scale: 90
    outcome:
      icon: fail
      condition: kylie.yandere >= 50

  yandere90:
    name: Do not let Kylie's Yandere get too high.
    condition: kylie.yandere > 50
    percentage:
      value: kylie.yandere.val
      scale: 90
    outcome:
      description: Do not let Kylie's Yandere get too high. Be sure you have a save from before this event.
      icon: fail
      condition: kylie.yandere >= 90

  charm30:
    name: Be charming enough for Kylie to notice me
    condition: '"kylie_event_01" in DONE'
    outcome:
      condition: hero.charm >= 30
      next:
        - kylie_event_02
        - place_camera_in_house

  kylie_event_02:
    name: Meet Kylie at the university on Tuesday or Friday
    related_event: kylie_event_02
    condition: hero.charm >= 30
    outcome:
      condition: '"kylie_event_02" in DONE'

  love40:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 40
    outcome:
      hide: True
      condition: kylie.love >= 40

  kylie_event_03:
    name: Call Kylie in the evening
    related_event: call_kylie
    condition: kylie.love >= 40
    outcome:
      condition: '"Call Kylie" in DONE or "call_kylie" in DONE'

  love50:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 50
    outcome:
      hide: True
      condition: kylie.love >= 50

  kylie_event_04:
    name: Flirt with another girl in front of Kylie
    related_event: kylie_event_04
    condition: kylie.love >= 50
    outcomes:
      jealous:
        conditions:
          - '"kylie_event_04" in DONE'
          - kylie.flags.jealouspath
        next: kylie_event_06
      not_jealous:
        conditions:
          - '"kylie_event_04" in DONE'
          - not kylie.flags.jealouspath
        next: promoted1

  promoted1:
    name: Have a good enough job for Kylie's sister Alexis to notice me
    conditions:
      - '"kylie_event_04" in DONE'
      - not kylie.flags.jealouspath
    outcome:
      hide: True
      condition: game.flags.promoted >= 6

  wait3:
    name: Wait 3 days
    percentage:
      value: 3 - kylie.timers.nextevent
      scale: 3
    conditions:
      - '"kylie_event_04" in DONE'
      - game.flags.promoted >= 6
      - not kylie.flags.jealouspath
    outcome:
      hide: True
      condition: not kylie.flags.nextevent

  kylie_event_05:
    name: Talk to Kylie
    related_event: kylie_event_05
    conditions:
      - '"kylie_event_04" in DONE'
      - '"alexis_event_01" in DONE'
      - not kylie.flags.jealouspath
      - not kylie.flags.schedule == "jail"
    outcome:
      condition: '"kylie_event_05" in DONE'
      next: None

  kylie_event_06:
    name: Wait for Kylie to do something.
    related_event: kylie_event_06
    conditions:
      - '"kylie_event_04" in DONE'
      - kylie.flags.jealouspath
      - not kylie.flags.schedule == "jail"
    outcome:
      condition: '"kylie_event_06" in DONE'
      next:
        - kylie_event_07a
        - kylie_event_07b

  love80:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 80
    outcome:
      hide: True
      conditions: kylie.love >= 80

  kylie_event_07a:
    name: Go see if Kylie is doing fine.
    related_event: kylie_event_07a
    toggle: True
    conditions:
      - '"kylie_event_05" in DONE or "kylie_event_06" in DONE'
      - kylie.love >= 80
      - kylie.yandere < 25
      - not kylie.flags.cantgetbetter
      - not kylie.flags.schedule == "jail"
    outcome:
      condition: '"kylie_event_07a" in DONE'
      next:
        - kylie_event_08a
        - kylie_event_08b

  kylie_event_07b:
    name: Go see if Kylie is doing better.
    related_event: kylie_event_07b
    toggle: True
    conditions:
      - '"kylie_event_05" in DONE or "kylie_event_06" in DONE'
      - kylie.love >= 80
      - kylie.yandere >= 25
      - not kylie.flags.schedule == "jail"
    outcome:
      condition: '"kylie_event_07b" in DONE'
      next:
        - kylie_event_08b

  love100:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 100
    outcome:
      hide: True
      conditions: kylie.love >= 100

  kylie_event_08a:
    name: Meet up with Kylie at the coffee shop.
    related_event: kylie_event_08a
    toggle: True
    conditions:
      - '"kylie_event_07a" in DONE'
      - kylie.love >= 100
      - not kylie.flags.cantgetbetter
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_08a" in DONE'
      next:
        - kylie_event_09a

  kylie_event_08b:
    name: I wonder what Kylie is doing
    related_event: kylie_event_08b
    toggle: True
    conditions:
      - '"kylie_event_07a" in DONE or "kylie_event_07b" in DONE'
      - kylie.love >= 100
      - kylie.flags.cantgetbetter
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_08b" in DONE'
      next:
        - kylie_event_09b

  love120:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 120
    outcome:
      hide: True
      conditions: kylie.love >= 120

  kylie_event_09a:
    name: Go check on Kylie and her therapy progress
    related_event: kylie_event_09a
    toggle: True
    conditions:
      - '"kylie_event_08a" in DONE'
      - kylie.love >= 120
      - kylie.yandere < 25
      - not kylie.flags.cantgetbetter
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_09a" in DONE'
      next:
        - love150
        - kylie_event_10a

  kylie_event_09b:
    name: I need answers from Kylie about her piercing my condoms
    related_event: kylie_event_09b
    toggle: True
    conditions:
      - '"kylie_event_08b" in DONE'
      - kylie.love >= 120
      - kylie.yandere >= 35
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_09b" in DONE'
      next:
        - love150
        - kylie_event_10b

  love150:
    name: Get to know Kylie better
    percentage:
      value: kylie.love.val
      scale: 150
    outcome:
      hide: True
      conditions: kylie.love >= 150
      next: None

  kylie_event_10a:
    name: Go tell Kylie how proud you are of her
    related_event: kylie_event_10a
    toggle: True
    conditions:
      - '"kylie_event_09a" in DONE'
      - kylie.love >= 150
      - kylie.yandere < 25
      - not kylie.flags.cantgetbetter
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_10a" in DONE'
      next: None

  kylie_event_10b:
    name: Days are peaceful without Kylie. Maybe too peaceful...
    related_event: kylie_event_10b
    toggle: True
    conditions:
      - '"kylie_event_09b" in DONE'
      - kylie.yandere >= 60
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_10b" in DONE'

  kylie_event_11b:
    name: Confront Kylie about the last time she came at the house.
    related_event: kylie_event_11b
    toggle: True
    conditions:
      - '"kylie_event_10b" in DONE'
      - kylie.yandere >= 75
      - not kylie.flags.schedule == "jail"
      - not kylie.flags.nextevent
    outcome:
      condition: '"kylie_event_11b" in DONE'
      next: None

  place_camera_in_house:
    name: Place a camera on the front of the house.
    toggle: True
    related_event: house_place_spy_camera
    conditions:
      - '"kylie_run" in DONE'
      - not game.flags.kyliecameraplaced
    outcomes:
      success:
        conditions:
          - '"house_remove_spy_camera" in DONE'
          - kylie.flags.policestation
        description: The footage shows Kylie stalking me.

  kylie_camera:
    name: You have footage of Kylie stalking you. Either confront her, or take it to the police.
    condition: '"kylie_investigation_1" in DONE'
    outcomes:
      confront:
        condition: '"kylie_talk_stalking" in DONE'
        description: Kylie apologized for stalking and promised not to do it again.
      no_evidence:
        condition: '"kylie_investigation_2" in DONE and not kylie.flags.arrest'
        description: The officer didn't believe my story. I hope Kylie doesn't find out what I did...
      arrest:
        condition: 'kylie.flags.arrest'
        description: The authorities are looking into things. Hopefully something happens soon...

  kylie_cookies:
    name: Eat Kylie's cookies in front of her
    condition: "hero.has_item(\"kylie_cookies\")"
    outcome:
      next: None
      condition: kylie.flags.atecookies

  kylie_breakup_1:
    name: Kylie doesn't seem happy about our break up.
    related_event: kylie_breakup_1
    toggle: True
    conditions:
      - kylie.flags.friendzone or kylie.flags.breakup
      - not kylie.flags.breakupDelay
    outcome:
      condition: "'kylie_breakup_1' in DONE"
      next: kylie_breakup_2

  kylie_breakup_2:
    name: Kylie seemed really gloomy those past days.
    related_event: kylie_breakup_2
    toggle: True
    conditions:
      - "'kylie_breakup_1' in DONE"
      - not kylie.flags.breakupDelay
      - not alexis.hidden
    outcome:
      condition: "'kylie_breakup_2' in DONE"
      next: None

  date:
    name: Go on a date with Kylie
    condition: True
    outcome:
      condition: kylie.flags.dates >= 1
      next: birthday_date

  birthday_date:
    name: Take Kylie out on a night date for her birthday
    condition: kylie.flags.dates >= 1
    outcome:
      condition: '"kylie_birthday_date_male" in DONE'
      next: None

  sex:
    name: Have sex with Kylie
    condition: True
    outcome:
      condition: kylie.sexperience >= 1
      next: None

  love:
    name: Get Kylie to fall in love with me
    condition: True
    percentage:
      value: kylie.love.val
      scale: 200
    outcome:
      condition: kylie.love.val == 200
      next: None

  ring:
    name: Buy a wedding ring
    condition: True
    outcome:
      condition: hero.has_item("wedding_ring")

  propose:
    name: Propose to Kylie
    condition: hero.has_item("wedding_ring")
    outcome:
      condition: kylie.flags.engagedmike
      next: None

  preg:
    name: Get Kylie pregnant
    optional: True
    condition: True
    outcome:
      condition: kylie.flags.pregnancies_number > 0
      next: None

  slave:
    name: Make Kylie my sex slave
    optional: True
    condition: True
    outcome:
      condition: kylie.is_sex_slave
      next: None
