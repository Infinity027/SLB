name: Getting Started
short: Get Started
# This should always be first when shown.
sort: "0000"
type: generic
description: "Get started with Love & Sex: Second base!"
participants:
  - hero
condition: hero.is_female

outcome:
  condition: all(step.complete for step in self.parent.steps.values())
  description: "I have a good start on getting my life in order!"

steps:
  eat:
    name: Eat a meal
    condition: True
    outcome:
        condition: 'hero.flags.alone_meal'
        next: None

  shower:
    name: Take a shower
    condition: True
    outcome:
      condition: '"take_a_shower" in DONE'
      next: None

  tv:
    name: Watch TV
    condition: True
    outcome:
      condition: '"watch_tv" in DONE'
      next: None

  videogame:
    name: Play a video game in the arcade
    condition: True
    outcome:
      condition: '"play_a_videogame" in DONE'
      next: None

  job:
    name: Find a job
    condition: True
    outcome:
      condition: game.flags.job_day or game.flags.job_night

  work:
    name: Go to work
    condition: game.flags.job_day or game.flags.job_night
    outcome:
      condition: game.flags.story_hasworked
      next: None

  visitmall:
    name: Visit the mall
    condition: True
    outcome:
      condition: 'hero.flags.visited_rooms and "mall1" in hero.flags.visited_rooms'
      next: None

  visitpark:
    name: Visit the park
    condition: True
    outcome:
      condition: 'hero.flags.visited_rooms and "park" in hero.flags.visited_rooms'
      next: None

  visitpub:
    name: Visit the pub
    condition: True
    outcome:
      condition: 'hero.flags.visited_rooms and "pub" in hero.flags.visited_rooms'
      next: None

  fitness:
    name: Start training fitness
    condition: True
    percentage:
      value: hero.fitness.val
      scale: 40
    outcome:
      description: I got started training my fitness up, but I can do better
      condition: hero.fitness > 40
      next: None

  charm:
    name: Start training charm
    condition: True
    percentage:
      value: hero.charm.val
      scale: 40
    outcome:
      description: I got started training my charm up, but I can do better
      condition: hero.charm > 40
      next: None

  knowledge:
    name: Start training knowledge
    condition: True
    percentage:
      value: hero.knowledge.val
      scale: 40
    outcome:
      next: None
      description: I got started training my knowledge up, but I can do better
      condition: hero.knowledge > 40

  moralitygood:
    name: Raise my morality by attending church
    optional: True
    condition: True
    percentage:
      value: hero.morality.val
      scale: 10
    outcomes:
      success:
        conditions:
          - hero.morality >= 10
      fail:
        icon: fail
        conditions:
          - hero.morality <= -10

  moralitybad:
    name: Lower my morality
    optional: True
    condition: True
    percentage:
      value: 0 - hero.morality.val
      scale: 10
    outcomes:
      success:
        conditions:
          - hero.morality <= -10
      fail:
        icon: fail
        conditions:
          - hero.morality >= 10

  masturbate_female:
    name: Masturbate
    optional: True
    condition: True
    outcomes:
      complete:
        conditions:
          - '"masturbate_female" in DONE'
        next: [pussyTraining, assTraining, mouthTraining]

  pussyTraining:
    name: Train my pussy looser
    optional: True
    percentage:
      value: hero.skills.pussy.value
      scale: 20
    outcomes:
      complete:
        conditions:
          - hero.skills.pussy.value >= 20
        next: None

  assTraining:
    name: Train my ass looser
    optional: True
    percentage:
      value: hero.skills.ass.value
      scale: 20
    outcomes:
      complete:
        conditions:
          - hero.skills.ass.value >= 20
        next: None

  mouthTraining:
    name: Train my mouth and gag reflex
    optional: True
    percentage:
      value: hero.skills.mouth.value
      scale: 20
    outcomes:
      complete:
        conditions:
          - hero.skills.mouth.value >= 20
        next: None

  clothes:
    name: Change my clothes
    condition: True
    outcome:
      condition: 'hero.equipment["clothes"]'
      next: None

  accessory:
    name: Change my accessory
    condition: True
    outcome:
      condition: 'hero.equipment["accessory"]'
      next: None

  gym:
    name: Access gym by buying sport clothes
    condition: True
    outcome:
      condition: 'hero.has_item("sport_clothes")'
      next: None

  nightclub:
    name: Access nightclub by buying a fancy dress
    condition: 'game.days_played >= 7 or "metal_harem_event_04" in DONE or hero.has_item("fancy_dress")'
    outcome:
      condition: 'hero.has_item("fancy_dress")'
      next: None

  beach:
    name: Access beach (in summer) by buying a vehicle
    condition: 'game.days_played >= 7 in DONE or hero.has_vehicle'
    outcome:
      condition: 'hero.has_vehicle'
      next: None

  waterpark:
    name: Access water park (spring or summer) by buying a swimsuit
    condition: 'game.days_played >= 7 or hero.has_item("swimsuit")'
    outcome:
      condition: 'hero.has_item("swimsuit")'
      next: None

  nude_beach:
    name: There's rumors about a nudist beach. Ask around in the pub.
    conditions:
      - '"jack_event_01" in DONE'
      - hero.sexperience >= 10
    outcome:
      condition: '"jack_nude_beach" in DONE'
      next: None
