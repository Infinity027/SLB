name: Dwayne's secretary
wiki_link: "https://wiki.andrealphusgames.com/wiki/Dwayne/FemaleMC"
short: "{image=notify dwayne} · Dwayne"
description: "I'm now working for Dwayne."
participants:
  - dwayne
conditions:
  - hero.is_female
  - hero.flags.job_day == "office"
  - hero.flags.office_boss == "dwayne"

outcomes:
  complete:
    description: Dwayne's secretary story is complete.
    conditions:
      - dwayne.flags.secretary_complete
  fired:
    description: I refused to fulfill Dwayne's request
    conditions:
      - hero.flags.office_fired_dwayne
    icon: fail
  gone:
    condition: dwayne.is_gone_forever
    description: Dwayne has left and is no longer part of my life.
    icon: fail

steps:
  work_delay_1:
    name: Work at the office for a couple of days
    condition: hero.flags.office_boss == "dwayne"
    percentage:
      value: 5 - hero.timers.dwayne_office_job_delay
      scale: 5
    outcome:
      hide: True
      condition: not hero.flags.dwayne_office_job_delay

  dwayne_female_job_event_01:
    name: Work at the office while Dwayne's around
    related_event: dwayne_female_job_event_01
    conditions:
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.dwayne_office_job_delay
    outcomes:
      complete:
        condition: '"dwayne_female_job_event_01" in DONE'

  work_delay_2:
    name: Work at the office for a couple of days
    conditions:
      - '"dwayne_female_job_event_01" in DONE'
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.office_fired_dwayne
    percentage:
      value: 3 - hero.timers.dwayne_office_job_delay
      scale: 3
    outcome:
      hide: True
      condition: not hero.flags.dwayne_office_job_delay

  dwayne_female_job_event_02:
    name: Work at the office while Dwayne's around
    related_event: dwayne_female_job_event_02
    conditions:
      - '"dwayne_female_job_event_01" in DONE'
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.dwayne_office_job_delay
    outcomes:
      complete:
        condition: '"dwayne_female_job_event_02" in DONE'

  dwayne_female_job_event_03:
    name: Work at the office while Dwayne's around
    related_event: dwayne_female_job_event_03
    conditions:
      - '"dwayne_female_job_event_02" in DONE'
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.dwayne_office_job_delay
    outcomes:
      complete:
        condition: '"dwayne_female_job_event_03" in DONE'

  dwayne_female_job_event_04:
    name: Work at the office while Dwayne's around
    related_event: dwayne_female_job_event_04
    conditions:
      - '"dwayne_female_job_event_03" in DONE'
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.dwayne_office_job_delay
    outcomes:
      complete:
        condition: '"dwayne_female_job_event_04" in DONE'

  dwayne_female_job_event_05:
    name: Work at the office while Dwayne's around
    related_event: dwayne_female_job_event_05
    conditions:
      - '"dwayne_female_job_event_04" in DONE'
      - hero.flags.office_boss == "dwayne"
      - not hero.flags.dwayne_office_job_delay
    outcomes:
      complete:
        condition: '"dwayne_female_job_event_05" in DONE'

  dwayne_female_job_event_stalled:
    icon: stalled
    name: That's all of this story for now
    outcome:
      condition: False
