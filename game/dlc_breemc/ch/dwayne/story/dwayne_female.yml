name: Dwayne
wiki_link: "https://wiki.andrealphusgames.com/wiki/Dwayne/FemaleMC"
short: "{image=notify dwayne} · Dwayne"
description: "Dwayne is [mike.name]'s boss."
participants:
  - dwayne
conditions:
  - hero.is_female
  - '"dwayne_female_event_01" in DONE'

outcomes:
  complete:
    description: Dwayne story is complete.
    conditions:
      - dwayne.flags.complete
  engaged:
    condition: dwayne.flags.engagedmc
    description: Dwayne has agreed to marry me!
  gone:
    condition: dwayne.is_gone_forever
    description: Dwayne has left and is no longer part of my life.
    icon: fail

steps:
  love20:
    name: Get to know Dwayne better
    condition: '"dwayne_female_event_01" in DONE'
    percentage:
      value: dwayne.love.val
      scale: 20
    outcome:
      hide: True
      condition: dwayne.love >= 20

  dwayne_female_event_02:
    name: Meet Dwayne in the street.
    related_event: dwayne_female_event_02
    conditions:
      - dwayne.love >= 20
      - '"dwayne_female_event_01" in DONE'
    outcomes:
      complete:
        condition: '"dwayne_female_event_02" in DONE'

  love40:
    name: Get to know Dwayne better
    condition: '"dwayne_female_event_02" in DONE'
    percentage:
      value: dwayne.love.val
      scale: 40
    outcome:
      hide: True
      condition: dwayne.love >= 40

  dwayne_female_event_03:
    name: "Go on a date with [mike.name] at the nightclub while Dwayne's around."
    related_event: dwayne_female_event_03
    conditions:
      - dwayne.love >= 40
      - '"dwayne_female_event_02" in DONE'
    outcomes:
      complete:
        condition: '"dwayne_female_event_03" in DONE'

  love60:
    name: Get to know Dwayne better
    condition: '"dwayne_female_event_03" in DONE'
    percentage:
      value: dwayne.love.val
      scale: 60
    outcome:
      hide: True
      condition: dwayne.love >= 60

  dwayne_female_event_04:
    name: "Be home while [mike.name] is working, again."
    related_event: dwayne_female_event_04
    conditions:
      - dwayne.love >= 60
      - '"dwayne_female_event_03" in DONE'
    outcome:
      condition: '"dwayne_female_event_04" in DONE'

  love80:
    name: Get to know Dwayne better
    condition: '"dwayne_female_event_04" in DONE'
    percentage:
      value: dwayne.love.val
      scale: 80
    outcome:
      hide: True
      condition: dwayne.love >= 80
      next:
        - dwayne_female_event_05
        - dwayne_female_event_05_alt

  dwayne_female_event_05:
    name: Wander the street when Dwayne's there
    related_event: dwayne_female_event_05
    conditions:
      - dwayne.love >= 80
      - '"dwayne_female_event_04" in DONE'
    outcomes:
      complete:
        condition: '"dwayne_female_event_05" in DONE'
        next: love100
      other_complete:
        condition: '"dwayne_female_event_05_alt" in DONE'
        hide: True
        next: None

  dwayne_female_event_05_alt:
    name: Be home in the afternoon
    related_event: dwayne_female_event_05_alt
    conditions:
      - dwayne.love >= 80
      - '"dwayne_female_event_04" in DONE'
    outcomes:
      complete:
        condition: '"dwayne_female_event_05_alt" in DONE'
        next: love100
      other_complete:
        condition: '"dwayne_female_event_05" in DONE'
        hide: True
        next: None

  love100:
    name: Get to know Dwayne better
    condition: '"dwayne_female_event_05" in DONE or "dwayne_female_event_05_alt" in DONE'
    percentage:
      value: dwayne.love.val
      scale: 100
    outcome:
      hide: True
      condition: dwayne.love >= 100

  dwayne_female_stalled:
    icon: stalled
    name: That's all of Dwayne's story for now
    outcome:
      condition: False
