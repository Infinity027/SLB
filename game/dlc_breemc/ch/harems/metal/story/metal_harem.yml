      - '"metal_harem_event_01_b" in DONE'
      - not Harem.together(sasha, scottie, name='metal')
    icon: fail
  complete:
    description: Strip poker night was an experience.
    conditions:
      - '"metal_harem_event_09_b" in DONE'

