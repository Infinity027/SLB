name: Scottie & Sasha
display_name: Metal Harem
wiki_link: "https://wiki.andrealphusgames.com/wiki/Metal_Harem"
short: "{image=notify scottie}{image=notify sasha} · Metal Harem"
type: harem
description: "Scottie acted like a jerk the first time I met him."
