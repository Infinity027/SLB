name: Danny
wiki_link: "https://wiki.andrealphusgames.com/wiki/Danny/FemaleMC"
short: "{image=notify danny} · Danny"
description:
  - description: Danny is Lexi's friend.
    condition: danny.flags.lexi_relation == "friend"
  - description: Danny is Lexi's pimp.
    condition: danny.flags.lexi_relation == "pimp"
participants:
  - danny
conditions:
  - hero.is_female
  - '"danny_female_event_01" in DONE'

outcomes:
  complete:
    description: Danny story is complete.
    conditions:
      - danny.flags.complete
  engaged:
    condition: danny.flags.engagedmc
    description: Danny has agreed to marry me!
  gone:
    condition: danny.is_gone_forever
    description: Danny has left and is no longer part of my life.
    icon: fail

steps:
  danny_female_event_02:
    name: Go to the park late at night
    conditions:
      - '"danny_female_event_01" in DONE'
    outcome:
      condition: '"danny_female_event_02" in DONE'

  love20:
    name: Get to know Danny better
    condition: '"danny_female_event_02" in DONE'
    percentage:
      value: danny.love.val
      scale: 20
    outcome:
      hide: True
      condition: danny.love >= 20

  danny_female_event_03:
    name: "Go on a date with [mike.name] at the nightclub while Danny is in the Dark alley."
    related_event: danny_female_event_03
    conditions:
      - danny.love >= 20
      - '"danny_female_event_02" in DONE'
    outcome:
      condition: '"danny_female_event_03" in DONE'

  love40:
    name: Get to know Danny better
    condition: '"danny_female_event_03" in DONE'
    percentage:
      value: danny.love.val
      scale: 40
    outcome:
      hide: True
      condition: danny.love >= 40

  danny_female_event_04:
    name: Go to the mall in the afternoon
    related_event: danny_female_event_04
    conditions:
      - danny.love >= 40
      - '"danny_female_event_03" in DONE'
    outcome:
      condition: '"danny_female_event_04" in DONE'

  love60:
    name: Get to know Danny better
    condition: '"danny_female_event_04" in DONE'
    percentage:
      value: danny.love.val
      scale: 60
    outcome:
      hide: True
      condition: danny.love >= 60

  danny_female_event_05:
    name: Wait Danny's call when you are at home in the evening
    related_event: danny_female_event_05
    conditions:
      - danny.love >= 60
      - '"danny_female_event_04" in DONE'
    outcome:
      condition: '"danny_female_event_05" in DONE'

  love80:
    name: Get to know Danny better
    condition: '"danny_female_event_05" in DONE'
    percentage:
      value: danny.love.val
      scale: 80
    outcome:
      hide: True
      condition: danny.love >= 80

  danny_female_wait_06:
    icon: stalled
    name: That's all of Danny's story for now
    outcome:
      condition: False
