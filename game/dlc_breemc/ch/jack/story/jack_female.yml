name: Jack
wiki_link: "https://wiki.andrealphusgames.com/wiki/Jack/FemaleMC"
short: "{image=notify jack} · Jack"
description: "Jack is [mike.name]'s friend."
participants:
  - jack
conditions:
  - hero.is_female
  - '"jack_female_event_01" in DONE'
outcomes:
  gone:
    description: Jack has moved out.
    condition: jack.is_gone_forever
    icon: fail

steps:
  love20:
    name: Get to know Jack better
    conditions:
      - hero.is_female
      - '"jack_female_event_01" in DONE'
    percentage:
      value: jack.love.val
      scale: 20
    outcome:
      hide: True
      condition: jack.love >= 20
      next:
        - jack_event_02
        - jack_event_02_bis

  jack_event_02:
    name: Meet Jack at the Electronic Store
    related_event: jack_female_event_02
    conditions:
      - '"jack_female_event_01" in DONE'
      - jack.love >= 20
    outcomes:
      challenge:
        description: Jack challenged me on my Penultimate Fantasy 7 knowledge
        condition: '"jack_female_event_02" in DONE'
        next: love40
      bookstore:
        condition: '"jack_female_event_02_bis" in DONE'
        hide: True
        next: None

  love40:
    name: Get to know Jack better
    condition: '"jack_female_event_02" in DONE'
    percentage:
      value: jack.love.val
      scale: 40
    outcome:
      hide: True
      condition: jack.love >= 40

  jack_event_03:
    name: Be at home on the weekend to play video games with Jack
    related_event: jack_female_event_03
    conditions:
      - '"jack_female_event_02" in DONE'
      - jack.love >= 40
    outcome:
      description: We played some video game with Jack
      condition: '"jack_female_event_03" in DONE'

  love60:
    name: Get to know Jack better
    condition: '"jack_female_event_03" in DONE'
    percentage:
      value: jack.love.val
      scale: 60
    outcome:
      hide: True
      condition: jack.love >= 60

  jack_event_04:
    name: Talk to Jack on a weekend
    related_event: jack_female_event_04
    conditions:
      - '"jack_female_event_03" in DONE'
      - jack.love >= 60
    outcomes:
      agreed:
        description: Jack invited me at a comic convention. I agreed.
        conditions:
          - '"jack_female_event_04" in DONE'
          - not jack.flags.convention_declined
        next:
          - prepare_cosplay
          - jack_event_05
      declined:
        description: Jack invited me at a comic convention. I declined.
        conditions:
          - '"jack_female_event_04" in DONE'
          - jack.flags.convention_declined
        next:
          - None

  prepare_cosplay:
    name: Prepare my outfit for the convention (in bedroom)
    conditions:
      - '"jack_female_event_04" in DONE'
      - not jack.flags.convention_declined
    percentage:
      value: game.flags.cosplay_prepared
      scale: 100
    outcome:
      hide: True
      condition: "game.flags.cosplay_prepared >= 100 or not jack.flags.convention_delay"

  jack_event_05:
    name: Be ready for the convention with Jack
    related_event: jack_female_event_05
    conditions:
      - '"jack_female_event_04" in DONE'
      - not jack.flags.convention_declined
    percentage:
      value: jack.timers.convention_delay
      scale: 14
      invert: True
    outcome:
      description: I assisted to the comic convention with Jack
      condition: '"jack_female_event_05" in DONE'

  love120:
    name: Get to know Jack better
    condition: '"jack_female_event_05" in DONE'
    percentage:
      value: jack.love.val
      scale: 120
    outcome:
      hide: True
      conditions: jack.love >= 120

  jack_event_06:
    name: Talk with Jack after a date at home
    related_event: jack_female_event_06
    conditions:
      - '"jack_female_event_05" in DONE'
      - "jack.love >= 120"
    outcome:
      description: I talked with Jack about his insecurities towards his look
      condition: '"jack_female_event_06" in DONE'

  love140:
    name: Get to know Jack better
    condition: '"jack_female_event_06" in DONE'
    percentage:
      value: jack.love.val
      scale: 140
    outcome:
      hide: True
      conditions: jack.love >= 140

  jack_event_07:
    name: Jack looks concerned
    related_event: jack_female_event_07
    conditions:
      - '"jack_female_event_06" in DONE'
      - "jack.love >= 140"
    outcomes:
      dumped:
        description: Jack dumped me
        conditions:
          - '"jack_female_event_07" in DONE'
          - jack.is_gone_forever
        next: None
      complete:
        description: I talked with Jack about his felling
        conditions:
          - '"jack_female_event_07" in DONE'
          - not jack.is_gone_forever

  love160:
    name: Get to know Jack better
    condition: '"jack_female_event_07" in DONE'
    percentage:
      value: jack.love.val
      scale: 160
    outcome:
      hide: True
      conditions: jack.love >= 160

  jack_event_08:
    name: Wander the street on weekend afternoons
    related_event: jack_female_event_08
    conditions:
      - '"jack_female_event_07" in DONE'
    outcomes:
      complete:
        description: I talked with Jack about his felling
        conditions:
          - '"jack_female_event_08" in DONE'

  love180:
    name: Get to know Jack better
    condition: '"jack_female_event_08" in DONE'
    percentage:
      value: jack.love.val
      scale: 180
    outcome:
      hide: True
      conditions: jack.love >= 180

  jack_event_09:
    name: Take Jack on a date at the restaurant
    related_event: jack_female_event_09
    conditions:
      - '"jack_female_event_08" in DONE'
    outcomes:
      complete:
        description: I talked with Jack about his felling
        conditions:
          - '"jack_female_event_09" in DONE'
        next : None

  jack_event_stalled:
    icon: stalled
    name: That's all of Jack's story for now
    outcome:
      condition: False

  # Alternate route
  jack_event_02_bis:
    name: Meet Jack at the Book Store
    related_event: jack_female_event_02_bis
    conditions:
      - '"jack_female_event_01" in DONE'
      - jack.love >= 20
    outcomes:
      bookstore:
        condition: '"jack_female_event_02_bis" in DONE'
        next: love40_bis
      challenge:
        condition: '"jack_female_event_02" in DONE'
        hide: True
        next: None

  love40_bis:
    name: Get to know Jack better
    condition: '"jack_female_event_02_bis" in DONE'
    percentage:
      value: jack.love.val
      scale: 40
    outcome:
      hide: True
      condition: jack.love >= 40

  jack_event_03_bis:
    name: Be at home on the weekend to play Demons and Demigods with Jack
    related_event: jack_female_event_03_bis
    conditions:
      - '"jack_female_event_02_bis" in DONE'
      - jack.love >= 40
    outcome:
      description: We played Demons and Demigods with Jack
      condition: '"jack_female_event_03_bis" in DONE'

  love60_bis:
    name: Get to know Jack better
    condition: '"jack_female_event_03_bis" in DONE'
    percentage:
      value: jack.love.val
      scale: 60
    outcome:
      hide: True
      condition: jack.love >= 60

  jack_event_04_bis:
    name: Go find Jack at the park
    related_event: jack_female_event_04_bis
    conditions:
      - '"jack_female_event_03_bis" in DONE'
      - jack.love >= 60
    outcome:
      description: I've seen Jack doing larping with his friends
      condition: '"jack_female_event_04_bis" in DONE'

  jack_event_05_bis:
    name: Wait for Jack to call you
    condition: '"jack_female_event_04_bis" in DONE'
    related_event: jack_female_event_05_bis
    outcomes:
      go_to_gig:
        description: "I agree to go see [mike.name] and Sasha's gig show with Jack."
        conditions:
          - '"jack_female_event_05_bis" in DONE'
          - jack.flags.go_to_gig
        next: love120_bis
      dont_go_gig:
        description: "Jack suggested we go see [mike.name] and Sasha's gig show but I convinced him to do something together instead."
        conditions:
          - '"jack_female_event_05_bis" in DONE'
          - not jack.flags.go_to_gig
        next: None

  love120_bis:
    name: Get to know Jack better
    conditions:
      - '"jack_female_event_05_bis" in DONE'
      - jack.flags.go_to_gig
    percentage:
      value: jack.love.val
      scale: 120
    outcome:
      hide: True
      conditions: jack.love >= 120

  jack_event_06_bis:
    name: Meet Jack on Friday evening to go see the Deathless Harpies
    related_event: jack_female_event_06_bis
    conditions:
      - '"jack_female_event_05_bis" in DONE'
      - jack.love >= 120
    outcome:
      description: The Deathless Harpies were incredible on stage
      condition: '"jack_female_event_06_bis" in DONE'

  jack_event_07_bis_wait:
    icon: stalled
    name: That's all of Jack's story for now
    outcome:
      condition: False

  date:
    name: Go on a date with Jack
    condition: hero.is_female
    outcome:
      condition: jack.flags.dates >= 1
      next: birthday_date

  birthday_date:
    name: Take Jack out on a night date for her birthday
    condition: jack.flags.dates >= 1
    outcome:
      condition: '"jack_birthday_date_female" in DONE'
      next: None

  sex:
    name: Have sex with Jack
    condition: hero.is_female
    outcome:
      condition: jack.sexperience >= 1
      next: None

  love:
    name: Get Jack to fall in love with me
    condition: hero.is_female
    percentage:
      value: jack.love.val
      scale: 200
    outcome:
      condition: jack.love.val == 200
      next: None

  engaged:
    name: Propose to Jack
    outcome:
      condition: jack.flags.engagedmc
      next: None

#  slave:
