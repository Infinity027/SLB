name: Scottie
wiki_link: "https://wiki.andrealphusgames.com/wiki/Scottie/FemaleMC"
short: "{image=notify scottie} · Scottie"
description: "Scottie is Sasha's ex-boyfriend. He seems kind of dim, and can best be described as a lunkhead."
participants:
  - scottie
conditions:
  - hero.is_female
  - '"scottie_female_event_01" in DONE'

outcomes:
  done:
    description: I turned down Sasha's suggestion that she, Scottie and I have a threesome
    conditions:
      - False
    icon: fail
  avoided:
    description: I didn't let Scottie in.
    conditions:
      - hero.is_female
      - '"scottie_female_event_01" in DONE'
      - 'scottie.hidden'
    icon: fail

steps:
  scottie_female_event_01:
    name: Scottie barged in the house.
    related_event: scottie_female_event_01
    condition: '"scottie_female_event_01" in DONE'
    outcomes:
      complete:
        conditions:
          - '"scottie_female_event_01" in DONE'
          - 'not scottie.hidden'
        next: love20
      stalled:
        conditions:
          - '"scottie_female_event_01" in DONE'
          - 'scottie.hidden'
        icon: stalled
        next: None

  love20:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_01" in DONE'
    percentage:
      value: scottie.love.val
      scale: 20
    outcome:
      hide: True
      conditions: scottie.love >= 20
      next: scottie_female_event_02

  scottie_female_event_02:
    name: Scottie wants to see me. I should try to look for him.
    condition: '"scottie_female_event_01" in DONE'
    related_event: scottie_female_event_02
    outcome:
      conditions:
        - '"scottie_female_event_02" in DONE'

  love40:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_02" in DONE'
    percentage:
      value: scottie.love.val
      scale: 40
    outcome:
      hide: True
      conditions: scottie.love >= 40
      next: scottie_female_event_03

  scottie_female_event_03:
    name: Wait for it.
    condition: '"scottie_female_event_02" in DONE'
    related_event: scottie_female_event_03
    outcomes:
      saved:
        description: I was assaulted but Scottie came out of nowhere and saved me.
        conditions:
          - '"scottie_female_event_03" in DONE'
          - scottie.flags.saviour
        next: love60
      raped:
        description: I was assaulted but Scottie wasn't there to help me.
        conditions:
          - '"scottie_female_event_03" in DONE'
          - not scottie.flags.saviour
        next: get_scottie_phone_number

  love60:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_03" in DONE'
    percentage:
      value: scottie.love.val
      scale: 60
    outcome:
      hide: True
      conditions: scottie.love >= 60
      next: get_scottie_phone_number

  get_scottie_phone_number:
    name: I should get Scottie phone number.
    condition: "'scottie' not in hero.smartphone_contacts"
    outcome:
      conditions:
        - "'scottie' in hero.smartphone_contacts"
      hide: True
      next: scottie_female_event_04

  scottie_female_event_04:
    name: Wait for it.
    conditions:
      - '"scottie_female_event_03" in DONE'
      - "'scottie' in hero.smartphone_contacts"
    related_event: scottie_female_event_04
    outcome:
      conditions:
        - '"scottie_female_event_04" in DONE'
      next: scottie_female_event_05

  love80:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_04" in DONE'
    percentage:
      value: scottie.love.val
      scale: 80
    outcome:
      hide: True
      conditions: scottie.love >= 80
      next: get_scottie_phone_number

  scottie_female_event_05:
    name: Meet Scottie at the nightclub (not from a date).
    condition: '"scottie_female_event_04" in DONE'
    related_event: scottie_female_event_05
    outcome:
      conditions:
        - '"scottie_female_event_05" in DONE'
      next: love100

  love100:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_05" in DONE'
    percentage:
      value: scottie.love.val
      scale: 100
    outcome:
      hide: True
      conditions: scottie.love >= 100

  buy_sexy_dress:
    name: Buy a sexy dress
    conditions:
      - scottie.love >= 100
      - '"scottie_female_event_05" in DONE'
    outcome:
      conditions:
        - '"sexy_date_equip" in hero.inventory'
      hide: True

  scottie_female_event_06:
    name: Go on a date with Scottie
    related_event: scottie_female_event_06
    condition:
      - '"scottie_female_event_05" in DONE'
      - '"sexy_date_equip" in hero.inventory'
    outcome:
      conditions:
        - '"scottie_female_event_06" in DONE'
      next: None

  love120:
    name: Get to know Scottie better
    conditions:
      - '"scottie_female_event_06" in DONE'
    percentage:
      value: scottie.love.val
      scale: 120
    outcome:
      hide: True
      conditions: scottie.love >= 120

  scottie_female_event_07_stalled:
    icon: stalled
    name: That's all of Scottie's story for now
    outcome:
      condition: False

  sex:
    name: Have sex with Scottie
    condition: hero.is_female
    outcome:
      condition: scottie.sexperience >= 1
      next: None

  date:
    name: Go on a date with Scottie
    condition: hero.is_female
    outcome:
      condition: scottie.flags.dates >= 1
      next: birthday_date

  birthday_date:
    name: Take Scottie out on a afternoon date for her birthday
    condition: scottie.flags.dates >= 1
    outcome:
      condition: '"scottie_birthday_date_female" in DONE'
      next: None

  love:
    name: Get Scottie to fall in love with me
    condition: hero.is_female
    percentage:
      value: scottie.love.val
      scale: 200
    outcome:
      condition: scottie.love.val == 200
      next: None

