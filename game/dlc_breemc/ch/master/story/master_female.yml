name: The Master
wiki_link: "https://wiki.andrealphusgames.com/wiki/The_Master/FemaleMC"
description: The Master is a pervy old man who hangs out on the beach.
conditions:
  - '"master_training_female_event_06" in DONE'
  - hero.flags.master_training
participants:
  - master

outcomes:
  gone:
    description: The Master has left and is no longer part of my life.
    conditions:
      - master.is_gone_forever
    icon: fail

steps:
  master_female_event_01:
    name: Meet The Master for the final lesson
    related_event: master_female_event_01
    outcome:
      condition: '"master_female_event_01" in DONE'

  love20:
    name: Get to know The Master better
    conditions:
      - '"master_female_event_01" in DONE'
      - not master.hidden
    percentage:
      value: master.love.val
      scale: 20
    outcome:
      hide: True
      condition: master.love >= 20

  master_female_event_02:
    name: Visit The Master's house
    related_event: master_female_event_02
    conditions:
      - '"master_female_event_01" in DONE'
      - master.love >= 20
    outcome:
      condition: '"master_female_event_02" in DONE'

  love40:
    name: Get to know The Master better
    conditions:
      - '"master_female_event_02" in DONE'
      - not master.hidden
    percentage:
      value: master.love.val
      scale: 40
    outcome:
      hide: True
      condition: master.love >= 40

  master_female_event_03:
    name: Meet The Master in the street
    related_event: master_female_event_03
    conditions:
      - '"master_female_event_02" in DONE'
      - master.love >= 40
    outcome:
      condition: '"master_female_event_03" in DONE'

  love60:
    name: Get to know The Master better
    conditions:
      - '"master_female_event_03" in DONE'
      - not master.hidden
    percentage:
      value: master.love.val
      scale: 60
    outcome:
      hide: True
      condition: master.love >= 60

  master_female_event_04:
    name: Meet The Master at the beach
    related_event: master_female_event_04
    conditions:
      - '"master_female_event_03" in DONE'
      - master.love >= 60
    outcome:
      condition: '"master_female_event_04" in DONE'

  love80:
    name: Get to know The Master better
    conditions:
      - '"master_female_event_04" in DONE'
      - not master.hidden
    percentage:
      value: master.love.val
      scale: 80
    outcome:
      hide: True
      condition: master.love >= 80

  master_female_stalled:
    icon: stalled
    name: That's all of The Master's story for now
    outcome:
      condition: True

  handjob:
    name: Give The Master a handjob on the beach
    optional: True
    conditions:
      - '"master_female_meet_event_01" in DONE'
      - hero.morality <= -25
    outcome:
      condition: game.flags.master_handjob
      next: None

  blowjob:
    name: Give The Master a blowjob on the beach
    optional: True
    conditions:
      - '"master_female_meet_event_01" in DONE'
      - hero.morality <= -25
    outcome:
      condition: game.flags.master_blowjob
      next: None

  master_female_event_05:
      name: Clarify your relationship with The Master at his house
      related_event: master_female_event_05
      conditions:
        - '"master_female_event_04" in DONE'
        - master.love >= 80
      outcome:
        condition: '"master_female_event_05" in DONE'

  love100:
    name: Get to know The Master better
    conditions:
      - '"master_female_event_05" in DONE'
      - not master.hidden
    percentage:
      value: master.love.val
      scale: 100
    outcome:
      hide: True
      condition: master.love >= 100
