name: The Master - Training
wiki_link: "https://wiki.andrealphusgames.com/wiki/The_Master/FemaleMC"
description: The Master is a pervy old man who hangs out on the beach.
conditions:
  - '"meet_the_master_female" in DONE'
participants:
  - master

outcomes:
  complete:
    description: I've completed the Master's training.
    conditions:
      - '"master_training_female_event_06" in DONE'
      - hero.flags.master_training
  gone:
    description: I didn't want to continue the Master's training...
    conditions:
      - '"master_female_meet_event_02" in DONE'
      - not hero.flags.master_training
    icon: fail

steps:
  master_female_meet_event_01:
    name: Meet The Master on the beach
    related_event: master_female_meet_event_01
    outcome:
      condition: '"master_female_meet_event_01" in DONE'

  master_female_meet_event_02:
    name: Meet The Master on the beach again
    related_event: master_female_meet_event_02
    outcomes:
      success:
        conditions:
          - '"master_female_meet_event_02" in DONE'
          - hero.flags.master_training
        next:
          - master_training_female_event_01
      refused:
        icon: fail
        conditions:
          - '"master_female_meet_event_02" in DONE'
          - not hero.flags.master_training
        next: None

  master_training_female_event_01:
