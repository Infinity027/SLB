    related_event: angela_female_event_12b
    toggle: True
    conditions:
      - '"angela_female_event_10" in DONE'
      - angela.flags.angela_choice == "outside_help"
      - angela.flags.outside_help is None
    outcomes:
      refused:
        description: "[mike.name] refused to help"
        conditions:
          - '"angela_female_event_12b" in DONE'
          - angela.flags.outside_help is None
        icon: failed
        next: None
      complete:
        description: "[mike.name] agreed to help"
        conditions:
          - '"angela_female_event_12b" in DONE'
          - angela.flags.outside_help is "mike"
        next:
          - wait_angela_female_event_12b
      breakin:
        conditions:
          - '"angela_female_event_12a" in DONE'
        next: None
        hide: True

  wait_angela_female_event_12b:
    name: Wait a little
    conditions:
      - '"angela_female_event_12b" in DONE'
      - angela.flags.outside_help is "mike"
    percentage:
      value: angela.timers.angeladelay
      scale: 1
      invert: True
    outcome:
      hide: True
      conditions:
