    condition: True
    percentage:
      value: angela.love.val
      scale: 200
    outcome:
      condition: angela.love.val == 200
      next: None

  ring:
    name: Buy a wedding ring
    condition: True
    outcome:
      condition: hero.has_item("wedding_ring")

  propose:
    name: "Propose to Angela"
    condition: hero.has_item("wedding_ring")
    outcome:
