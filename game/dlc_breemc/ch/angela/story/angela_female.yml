  love200:
    name: Get to know Angela better
    condition: '"angela_female_event_15" in DONE'
    percentage:
      value: angela.love.val
      scale: 200
    outcome:
      hide: True
      condition: angela.love.val == 200

  date:
    name: "Go on a date with Angela"
    condition: True
    outcome:
      condition: angela.flags.dates >= 1
      next: birthday_date

  birthday_date:
    name: Take Angela out on a night date for her birthday
    condition: angela.flags.dates >= 1
    outcome:
      condition: '"angela_birthday_date_female" in DONE'
