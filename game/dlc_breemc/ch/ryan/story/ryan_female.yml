name: Ryan
wiki_link: "https://wiki.andrealphusgames.com/wiki/Ryan/FemaleMC"
short: "{image=notify ryan} · Ryan"
description: "I met [mike.name]'s friend Ryan."
participants:
  - ryan
conditions:
  - hero.is_female
  - '"ryan_female_event_01" in DONE'

outcomes:
  complete:
    description: Ryan story is complete.
    conditions:
      - ryan.flags.complete
  gone:
    description: Ryan has left and is no longer part of my life.
    condition: ryan.is_gone_forever
    icon: fail

steps:
  love20:
    name: Get to know Ryan better
    conditions:
      - "'ryan_female_event_01' in DONE"
    percentage:
      value: ryan.love.val
      scale: 20
    outcome:
      hide: True
      conditions: ryan.love >= 20

  ryan_female_event_02:
    name: Meet Ryan at the mall
    related_event: ryan_female_event_02
    conditions:
      - ryan.love >= 20
      - "'ryan_female_event_01' in DONE"
    outcome:
      description: Meet Ryan at the mall
      condition: '"ryan_female_event_02" in DONE'

  love40:
