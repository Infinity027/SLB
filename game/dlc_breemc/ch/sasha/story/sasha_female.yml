name: Sasha
wiki_link: "https://wiki.andrealphusgames.com/wiki/Sasha/FemaleMC"
short: "{image=notify sasha} · Sasha"
description: "One of my roommates, Sasha is a goth girl. She can be acerbic, but knows how to have a lot of fun."
participants:
  - sasha
condition: hero.is_female

outcomes:
  gone:
    description: Sasha has moved out and is no longer part of my life.
    conditions:
      - sasha.is_gone_forever
    icon: fail

steps:
  love30:
    name: Get to know Sasha better
    condition: hero.is_female
    percentage:
      value: sasha.love.val
      scale: 30
    outcome:
      hide: True
      condition: sasha.love >= 30

  sasha_female_event_02:
    name: Help Sasha unpack
    related_event: sasha_female_event_02
    conditions:
      - hero.is_female
      - sasha.love >= 30
    outcome:
      condition: '"sasha_female_event_02" in DONE'

  love40:
    name: Get to know Sasha better
    condition: '"sasha_female_event_02" in DONE'
    percentage:
      value: sasha.love.val
      scale: 40
    outcome:
      hide: True
      condition: sasha.love >= 40

  sasha_female_event_03:
    name: Hang out with Sasha at the mall
    related_event: sasha_female_event_03
    conditions:
      - sasha.love >= 40
      - '"sasha_female_event_02" in DONE'
    outcomes:
      ice cream:
        description: We had a great time hanging out
        condition: '"sasha_female_event_03" in DONE'

  love60:
    name: Get to know Sasha better
    condition: '"sasha_female_event_03" in DONE'
    percentage:
      value: sasha.love.val
      scale: 60
    outcome:
      hide: True
      condition: sasha.love >= 60

  sasha_female_event_04:
    name: Meet up with Sasha at the pub
    related_event: sasha_female_event_04
    conditions:
      - sasha.love >= 60
      - '"sasha_female_event_03" in DONE'
    outcome:
      description: We had a great time hanging out
      condition: '"sasha_female_event_04" in DONE'

  love100:
     name: Get to know Sasha better
     condition: '"sasha_female_event_04" in DONE'
     percentage:
       value: sasha.love.val
       scale: 100
     outcome:
       hide: True
       condition: sasha.love >= 100

  sasha_female_event_05:
    name: Spend some time with Sasha by the poolside (go to the kitchen during Spring or Summer)
    related_event: sasha_female_event_05
    toggle: True
    conditions:
      - sasha.love >= 100
      - game.season in [0, 1]
      - '"sasha_female_event_04" in DONE'
      - '"sasha_female_event_05" not in DONE'
      - '"sasha_female_event_05b" not in DONE'
    outcome:
      next: love140
      condition: '"sasha_female_event_05" in DONE'

  sasha_female_event_05b:
    name: Spend some time with Sasha by the poolside (go to the kitchen during Spring or Summer)
    related_event: sasha_female_event_05
    toggle: True
    conditions:
      - sasha.love >= 100
      - game.season in [2, 3]
      - '"sasha_female_event_04" in DONE'
      - '"sasha_female_event_05" not in DONE'
      - '"sasha_female_event_05b" not in DONE'
    outcome:
      next: love140
      condition: '"sasha_female_event_05b" in DONE'

  love120:
    name: Get to know Sasha better
    percentage:
      value: sasha.love.val
      scale: 120
    outcome:
      hide: True
      conditions: sasha.love >= 120

  sasha_female_event_sex_talk_05:
    name: Interact with Sasha
    related_event: sasha_female_event_sex_talk_05
    conditions:
      - sasha.love >= 120
      - '"sasha_female_event_05" in DONE or "sasha_female_event_05b" in DONE'
    outcome:
      next: love140
      condition: '"sasha_female_event_sex_talk_05" in DONE'

  love140:
    name: Get to know Sasha better
    percentage:
      value: sasha.love.val
      scale: 140
    outcome:
      hide: True
      conditions: sasha.love >= 140

  sasha_female_event_06:
    name: Meet Sasha in the kitchen for some coffee
    related_event: sasha_female_event_06
    conditions:
      - sasha.love >= 140
      - '"sasha_female_event_05" in DONE or "sasha_female_event_05b" in DONE'
    outcome:
      condition: '"sasha_female_event_06" in DONE'

  sasha_female_event_07:
    name: Go to Sasha's band's concert (be at home during the evening)
    related_event: sasha_female_event_07
    condition: '"sasha_female_event_06" in DONE'
    outcome:
      condition: '"sasha_female_event_07" in DONE'

  love180:
    name: Get to know Sasha better
    percentage:
      value: sasha.love.val
      scale: 180
    outcome:
      hide: True
      conditions: sasha.love >= 180

  sasha_female_event_08:
    name: Sasha seems bothered about something
    related_event: sasha_female_event_08
    condition: '"sasha_female_event_07" in DONE'
    outcome:
      next: sasha_stalled_wait
      condition: '"sasha_female_event_08" in DONE'

  sasha_stalled_wait:
    icon: stalled
    name: That's all of Sasha's story for now
    outcome:
      condition: False

  date:
    name: Go on a date with Sasha
    condition: True
    outcome:
      condition: sasha.flags.dates >= 1
      next: None

  sex:
    name: Have sex with Sasha
    condition: True
    outcome:
      condition: sasha.sexperience >= 1

  love:
    name: Get Sasha to fall in love with me
    condition: True
    percentage:
      value: sasha.love.val
      scale: 200
    outcome:
      condition: sasha.love.val == 200
      next: None

  slave:
    name: Make Sasha my sex slave
    optional: True
    condition: True
    outcome:
      condition: sasha.is_sex_slave
      next: None

  beach_date:
    name: Go on a date at the beach with Sasha
    related_event: sasha_female_beach_date_event_01
    optional: True
    condition: sasha.love >= 50
    outcome:
      condition: "'sasha_female_beach_date_event_01' in DONE"
      next: None
