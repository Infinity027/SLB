    name: Take Kat out on a night date for her birthday
    condition: kat.flags.dates >= 1
    outcome:
      condition: '"kat_birthday_date_male" in DONE'
      next: None

  sex:
    name: Have sex with Kat
    condition: True
    outcome:
      condition: kat.sexperience >= 1
      next: None

  love:
    name: Get Kat to fall in love with me
    condition: True
    percentage:
      value: kat.love.val
      scale: 200
    outcome:
      condition: kat.love.val == 200
      next: None

  ring:
    name: Buy a wedding ring
    condition: True
    outcome:
      condition: hero.has_item("wedding_ring")

  propose:
    name: Propose to Kat
    condition: hero.has_item("wedding_ring")
    outcome:
      condition: kat.flags.engagedmike
      next: None

  preg:
